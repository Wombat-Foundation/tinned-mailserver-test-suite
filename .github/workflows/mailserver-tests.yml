name: Mailserver Test Suite CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  typos-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for typos
        uses: crate-ci/typos@master

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y shellcheck python3-flake8
      - name: Run lint
        run: make lint

  smtp-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y swaks gettext-base

      - name: Prepare vars.conf
        run: |
          cat <<'EOF' > smtp-tests/vars.conf
          ${{ vars.MAIL_CONFIG_VARS }}
          export SENDER_AUTH_PASSWORD="${{ secrets.SENDER_AUTH_PASSWORD }}"
          EOF
          # Strip any carriage returns (\r) that might have been pasted from Windows
          sed -i 's/\r//g' smtp-tests/vars.conf
          if [ ! -s smtp-tests/vars.conf ]; then
            echo "Error: smtp-tests/vars.conf is empty. Check your MAIL_CONFIG_VARS variable."
            exit 1
          fi
      - name: Run SMTP tests
        working-directory: smtp-tests
        run: bash run.sh
