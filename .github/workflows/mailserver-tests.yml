name: Mailserver Test Suite CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  typos-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for typos
        uses: crate-ci/typos@master

  smtp-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y swaks gettext-base

      - name: Prepare vars.conf
        env:
          MAIL_CONFIG_VARS: ${{ vars.MAIL_CONFIG_VARS }}
          SENDER_AUTH_PASSWORD: ${{ secrets.SENDER_AUTH_PASSWORD }}
        run: |
          if [[ -z "$MAIL_CONFIG_VARS" ]]; then
            echo "Error: MAIL_CONFIG_VARS variable is missing."
            exit 1
          fi
          # Write the bulk config
          echo "$MAIL_CONFIG_VARS" > smtp-tests/vars.conf
          # Append the secret password
          echo "export SENDER_AUTH_PASSWORD=\"$SENDER_AUTH_PASSWORD\"" >> smtp-tests/vars.conf
      - name: Run SMTP tests
        working-directory: smtp-tests
        run: bash run.sh
