name: Mailserver Test Suite CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  smtp-tests:
    runs-on: ubuntu-latest
    env:
      # --- Non-sensitive Configuration (Edit these directly here) ---
      MAILSERVER_NAME: "mail.nutra.tk"
      SENDER_AUTH_USER: "shane@nutra.tk"
      SENDER_ADDRESS_MAIN: "shane@nutra.tk"
      SENDER_ADDRESS_ALIAS: "admin@nutra.tk"
      SENDER_ADDRESS_MAIN_TAG: "shane+test@nutra.tk"
      SENDER_ADDRESS_ALIAS_TAG: "admin+test@nutra.tk"
      SENDER_ADDRESS_DENIED: "otheruser@nutra.tk"
      SENDER_ADDRESS_FORGED: "ceo@google.com"
      SENDER_ADDRESS_FORGED2: "admin@microsoft.com"
      RECIPIENT_ADDRESS: "services@nutra.tk"
      
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y swaks gettext-base

      - name: Prepare vars.conf
        env:
          SENDER_AUTH_PASSWORD: ${{ secrets.SENDER_AUTH_PASSWORD }}
        run: |
          cat <<EOF > smtp-tests/vars.conf
          export TEMPLATE_PATH=./templates
          export CONFIG_PATH=./config
          export LOG_PATH=./logs
          export PAYLOAD_PATH=../test/payload_files
          export MAILSERVER_NAME="$MAILSERVER_NAME"
          export SENDER_AUTH_USER="$SENDER_AUTH_USER"
          export SENDER_AUTH_PASSWORD="$SENDER_AUTH_PASSWORD"
          export SENDER_ADDRESS_MAIN="$SENDER_ADDRESS_MAIN"
          export SENDER_ADDRESS_ALIAS="$SENDER_ADDRESS_ALIAS"
          export SENDER_ADDRESS_MAIN_TAG="$SENDER_ADDRESS_MAIN_TAG"
          export SENDER_ADDRESS_ALIAS_TAG="$SENDER_ADDRESS_ALIAS_TAG"
          export SENDER_ADDRESS_DENIED="$SENDER_ADDRESS_DENIED"
          export SENDER_ADDRESS_FORGED="$SENDER_ADDRESS_FORGED"
          export SENDER_ADDRESS_FORGED2="$SENDER_ADDRESS_FORGED2"
          export RECIPIENT_ADDRESS="$RECIPIENT_ADDRESS"
          EOF

      - name: Run SMTP tests
        working-directory: smtp-tests
        run: bash run.sh
