name: Mailserver Test Suite CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  typos-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for typos
        uses: crate-ci/typos@master

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y shellcheck python3-flake8
      - name: Run lint
        run: make lint

  smtp-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare .env
        run: |
          cat <<'EOF' > .env
          ${{ vars.MAIL_CONFIG_VARS }}
          SENDER_AUTH_PASSWORD="${{ secrets.SENDER_AUTH_PASSWORD }}"
          EOF
          # Strip any carriage returns (\r) that might have been pasted from Windows
          sed -i 's/\r//g' .env
          if [ ! -s .env ]; then
            echo "Error: .env is empty. Check your MAIL_CONFIG_VARS variable."
            exit 1
          fi

      - name: Run SMTP tests
        run: make test
