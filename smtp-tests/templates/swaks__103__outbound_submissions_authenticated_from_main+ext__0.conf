# Connection
--server ${MAILSERVER_NAME}:465
--tls-on-connect
-4
# Greeting
--helo ${HELO_NAME}
# Authentication
--auth PLAIN
--auth-user ${SENDER_AUTH_USER}
--auth-password ${SENDER_AUTH_PASSWORD}
# Envelope
--to ${RECIPIENT_ADDRESS}
--from ${SENDER_ADDRESS_MAIN_TAG}
# DATA
--h-Subject Swaks SMTP test - Sender authenticated mail+extension address
--body @${TEMPLATE_PATH}/swaks__103__outbound_submissions_authenticated_from_main+ext.txt
# END
