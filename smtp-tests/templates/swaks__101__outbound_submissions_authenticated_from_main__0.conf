# Connection
--server ${MAILSERVER_NAME}:465
--tls-on-connect
-4
# Greeting
--helo localhost
# Authentication
--auth PLAIN
--auth-user ${SENDER_AUTH_USER}
--auth-password ${SENDER_AUTH_PASSWORD}
# Envelope
--to ${RECIPIENT_ADDRESS}
--from ${SENDER_ADDRESS_MAIN}
# DATA
--h-Subject Swaks SMTP test - Sender authenticated main address
--body @${TEMPLATE_PATH}/swaks__101__outbound_submissions_authenticated_from_main.txt
# END
