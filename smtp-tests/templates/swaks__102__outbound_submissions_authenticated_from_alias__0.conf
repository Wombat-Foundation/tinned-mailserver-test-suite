# Connection
--server ${MAILSERVER_NAME}:465
--tls-on-connect
-4
# Greeting
--hello localhost
# Authentication
--auth PLAIN
--auth-user ${SENDER_AUTH_USER}
--auth-password ${SENDER_AUTH_PASSWORD}
# Envelope
--to ${RECIPIENT_ADDRESS}
--from ${SENDER_ADDRESS_ALIAS}
# DATA
--h-Subject Swaks SMTP test - Sender authenticated alias address
--body @${TEMPLATE_PATH}/swaks__102__outbound_submissions_authenticated_from_alias.txt
# END
