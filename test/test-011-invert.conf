# Server name to connect to
--server mail.example.com:25
--helo localhost
# Recipient address
--to local-user01@example.com
# Sender address
--from external.address02@example.net
#
# Use IPv4
-4
# Use SSL connection (ports 465)
#--tls-on-connect
# Use STARTTLS on connection (ports 25 and 587)
--tls
#
# Authentication method
#--auth PLAIN
# Authentication username
#--auth-user local-user02@example.com
#--auth-password secret
#
# Subject for the email
--h-Subject Test Email swaks 011
# Message text
--body Hi,\n\nThis is a test email sent using swaks performing a set of tests with the new\nmail server setup. This email was sent via smtp port 25, IPv4, STARTTLS connection, as incoming message with EICAR.txt AV test signature as attachment.\n\nBest regards,\ntest script\n
# Test Attachment from file
--attach-name MyTestDocument.txt
--attach @payload_files/EICAR.TXT
