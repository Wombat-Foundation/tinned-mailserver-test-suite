# Server name to connect to
--server mail.example.com:465
--helo localhost
# Recipient address
--to external.address@example.net
# Sender address
--from local-user01@example.com
#
# Use IPv4
-4
# Use SSL connection (ports 465)
--tls-on-connect
# Use STARTTLS on connection (ports 25 and 587)
#--tls
#
# Authentication method
--auth PLAIN
# Authentication username
--auth-user local-user02@example.com
--auth-password secret
#
# Subject for the email
--h-Subject Test Email swaks 001
# Message text
--body Hi,\n\nThis is a test email sent using swaks performing a set of tests with the new\nmail server setup. This email was sent via submission port 465, IPv4, SSL connection, PLAIN authenticated.\n\nBest regards,\ntest script\n
#
