# Server name to connect to
--server mail.example.com:25
--helo localhost
# Recipient address
--to local-user01@example.com
# Sender address
--from external.address02@example.net
#
# Use IPv4
-4
# Use SSL connection (ports 465)
#--tls-on-connect
# Use STARTTLS on connection (ports 25 and 587)
--tls
#
# Authentication method
#--auth PLAIN
# Authentication username
#--auth-user local-user02@example.com
#--auth-password secret
#
# Subject for the email
--h-Subject Test Email swaks 015
# Message text
--body Hi,\n\nThis is a test email sent using swaks performing a set of tests with the new\nmail server setup. This email was sent via smpt port 25, IPv4, STARTTLS connection, as incoming message with GTUBE AV test signature.\n\nThis is the GTUBE, the\n	Generic\n	Test for\n	Unsolicited\n	Bulk\n	Email\n\nIf your spam filter supports it, the GTUBE provides a test by which you\ncan verify that the filter is installed correctly and is detecting incoming\nspam. You can send yourself a test mail containing the following string of\ncharacters (in upper case and with no white spaces and line breaks):\n\nXJS*C4JDBQADN1.NSBN3*2IDNEN*GTUBE-STANDARD-ANTI-UBE-TEST-EMAIL*C.34X\n\nYou should send this test mail from an account outside of your network.\n\nBest regards,\ntest script\n
