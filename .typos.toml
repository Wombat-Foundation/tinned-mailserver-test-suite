[default]
extend-ignore-re = [
    # Ignore EICAR signatures which look like typos
    "XJS\\*C4JDBQADN1\\.NSBN3\\*2IDNEN\\*GTUBE-STANDARD-ANTI-UBE-TEST-EMAIL\\*C\\.34X",
    "X5O!P%@AP\\[4\\\\P\\^ZX54\\(P\\^\\)7CC\\)7\\} \\$EICAR-STANDARD-ANTIVIRUS-TEST-FILE! \\$H\\+H\\*",
]

[files]
extend-exclude = [
    ".git/",
    "test/payload_files/",
]

[default.extend-words]
# SMTP and technical terms that might be flagged
helo = "helo"
swaks = "swaks"
smtpd = "smtpd"
LDA = "LDA"
plusaddr = "plusaddr"
tinned = "tinned"
Codeberg = "Codeberg"
Forgejo = "Forgejo"
envsubst = "envsubst"
NAItube = "NAItube"
GTUBE = "GTUBE"
EICAR = "EICAR"
